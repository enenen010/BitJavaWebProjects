<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <script type="text/javascript">

    //bind는 this를 대체하는 bind, 대상 Object의 해당에 입려한 obj껄 대입
    var person = {
        firstName:"홍",
        lastName:"길동",
        fullName:function(){
            return this.firstName+" "+this.lastName;
        }

    }

    //this에 바인딩만 해놈
    //.bind()
    
    // 실행까지; 2개 차이 파라매터를 (coll),로 계속 넣냐 (apply)배열로 묶어넣나
    //.coll()
    var fullName = person.fullName.apply()
    //.apply()
    var fullName = person.fullName.apply()
    </script>
